# === JWCode ProGuard 混淆配置 ===
# 入口点
-keep class com.jwcode.web.WebLauncher { public static void main(java.lang.String[]); }

# Jackson POJO（被 readValue 反序列化的类）
-keep class com.jwcode.core.a2a.model.AgentCard
-keep class com.jwcode.core.agent.AgentState
-keep class com.jwcode.core.planner.ai.DecompositionResult

# Guice @Inject 成员
-keepclassmembers class * {
    @com.google.inject.Inject <init>(...);
    @com.google.inject.Inject <fields>;
}
-keep @com.google.inject.Singleton class *

# Jackson 序列化所需（默认构造、getter/setter）
-keepclassmembers class com.jwcode.** {
    public <init>();
    public *** get*();
    public void set*(***);
}

# 保持所有第三方库不混淆
-keep class !com.jwcode.** { *; }

# ProGuard 通用配置
-dontshrink
-dontoptimize
-printmapping proguard.map
-verbose

