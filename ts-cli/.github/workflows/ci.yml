# =============================================================================
# JWCode CLI — CI 工作流
#
# 在 GitHub Actions 上运行。本地提交前请执行：
#   npm run precommit
#
# 或手动执行：
#   npx tsc --noEmit    # 类型检查
#   npm test            # 运行测试
#   npm run build       # 构建打包
# =============================================================================

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
