name: Release

on:
  push:
    tags:
      - 'v*'

env:
  NODE_VERSION: '20'
  JAVA_VERSION: '17'

jobs:
  # ============================================================================
  # Job 1: Build JRE for three platforms in parallel
  # ============================================================================
  build-jre:
    name: JRE (${{ matrix.platform }})
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win32-x64
          - os: ubuntu-latest
            platform: linux-x64
          - os: macos-latest
            platform: darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install npm dependencies
        working-directory: ts-cli
        run: npm ci

      - name: Build JRE archive
        working-directory: ts-cli
        run: node scripts/build-jre-zip.js

      - name: Upload JRE artifact
        uses: actions/upload-artifact@v4
        with:
          name: jre-${{ matrix.platform }}
          path: ts-cli/dist/jre-${{ matrix.platform }}.tar.gz
          compression-level: 0

  # ============================================================================
  # Job 2: Build npm package (CLI + JAR)
  # ============================================================================
  build-package:
    name: Build npm package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ts-cli/package-lock.json

      - name: Install npm dependencies
        working-directory: ts-cli
        run: npm ci

      - name: Build Java backend (fat JAR)
        run: mvn package -pl jwcode-web -am -q -DskipTests

      - name: Build CLI (skip jlink, JRE is downloaded by postinstall)
        working-directory: ts-cli
        run: node build.mjs --publish

      - name: Verify build output
        working-directory: ts-cli
        run: |
          test -f dist/cli.js && echo "dist/cli.js OK"
          test -f backend/jwcode-web.jar && echo "backend/jwcode-web.jar OK"

      - name: Create npm tarball
        working-directory: ts-cli
        run: npm pack

      - name: Rename npm tarball to stable name
        working-directory: ts-cli
        run: |
          mv jwcode-cli-*.tgz "jwcode-cli-${{ github.ref_name }}.tgz"

      - name: Upload npm package artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-package
          path: ts-cli/jwcode-cli-${{ github.ref_name }}.tgz
          compression-level: 0

  # ============================================================================
  # Job 3: Create GitHub Release + publish to npm
  # ============================================================================
  release:
    name: Create Release & Publish
    needs: [build-jre, build-package]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'

      - name: Download all JRE artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: jre-*
          path: jre-artifacts

      - name: Download npm package
        uses: actions/download-artifact@v4
        with:
          name: npm-package
          path: npm-package

      - name: Create GitHub Release & upload all assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ github.ref_name }}"
          ASSETS=$(find jre-artifacts npm-package -type f | tr '\n' ' ')
          echo "Tag: $TAG"
          echo "Uploading assets: $ASSETS"
          # --clobber overwrites an existing release (e.g. on workflow re-run)
          gh release create "$TAG" $ASSETS --generate-notes --title "$TAG" --clobber

      - name: Install dependencies for publish
        working-directory: ts-cli
        run: npm ci

      - name: Publish to all 15 npm orgs
        working-directory: ts-cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm run publish:all

