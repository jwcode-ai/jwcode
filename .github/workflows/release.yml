name: Release

on:
  push:
    tags:
      - 'v*'

env:
  NODE_VERSION: '20'
  JAVA_VERSION: '17'

jobs:
  # ============================================================================
  # Job 1: Build JRE for three platforms in parallel
  # ============================================================================
  build-jre:
    name: JRE (${{ matrix.platform }})
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win32-x64
          - os: ubuntu-latest
            platform: linux-x64
          - os: macos-latest
            platform: darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install npm dependencies
        working-directory: ts-cli
        run: npm ci

      - name: Build JRE archive
        working-directory: ts-cli
        run: node scripts/build-jre-zip.js

      - name: Upload JRE artifact
        uses: actions/upload-artifact@v4
        with:
          name: jre-${{ matrix.platform }}
          path: ts-cli/dist/jre-${{ matrix.platform }}.tar.gz
          compression-level: 0

  # ============================================================================
  # Job 2: Build npm package (CLI + JAR)
  # ============================================================================
  build-package:
    name: Build npm package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ts-cli/package-lock.json

      - name: Install npm dependencies
        working-directory: ts-cli
        run: npm ci

      - name: Build Java backend (fat JAR)
        run: mvn package -pl jwcode-web -am -q -DskipTests

      - name: Build CLI (skip jlink, JRE is downloaded by postinstall)
        working-directory: ts-cli
        run: node build.mjs --publish

      - name: Verify build output
        working-directory: ts-cli
        run: |
          test -f dist/cli.js && echo "dist/cli.js OK"
          test -f backend/jwcode-web.jar && echo "backend/jwcode-web.jar OK"

      - name: Create npm tarball
        working-directory: ts-cli
        run: npm pack

      - name: Upload npm package artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-package
          path: ts-cli/jwcode-cli-*.tgz
          compression-level: 0

  # ============================================================================
  # Job 3: Create GitHub Release + publish to npm
  # ============================================================================
  release:
    name: Create Release & Publish
    needs: [build-jre, build-package]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'

      - name: Download all JRE artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: jre-*
          path: jre-artifacts

      - name: Download npm package
        uses: actions/download-artifact@v4
        with:
          name: npm-package
          path: npm-package

      - name: Debug — list downloaded artifacts
        run: |
          echo "=== jre-artifacts ==="
          ls -laR jre-artifacts/ || echo "(empty)"
          echo "=== npm-package ==="
          ls -laR npm-package/ || echo "(empty)"

      - name: Create GitHub Release (JRE tarballs)
        uses: softprops/action-gh-release@v2
        with:
          files: jre-artifacts/**/*.tar.gz
          generate_release_notes: true
          fail_on_unmatched_files: false

      - name: Upload npm package with gh CLI
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload v3.0.0 npm-package/*.tgz --clobber

      - name: Publish to npm
        working-directory: ts-cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish

