name: Release

on:
  push:
    tags:
      - 'v*'

env:
  NODE_VERSION: '20'
  JAVA_VERSION: '17'

jobs:
  # ============================================================================
  # Job 1: Build npm package (CLI + JAR)
  # ============================================================================
  build-package:
    name: Build npm package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ts-cli/package-lock.json

      - name: Install npm dependencies
        working-directory: ts-cli
        run: npm ci

      - name: Build Java backend (fat JAR)
        run: mvn package -pl jwcode-web -am -q -DskipTests

      - name: Build CLI
        working-directory: ts-cli
        run: node build.mjs

      - name: Verify build output
        working-directory: ts-cli
        run: |
          ls -la dist/cli.js
          ls -la backend/jwcode-web.jar

      - name: Create npm tarball
        working-directory: ts-cli
        run: npm pack

      - name: Rename npm tarball to stable name
        working-directory: ts-cli
        run: |
          mv jwcode-cli-*.tgz "jwcode-cli-${{ github.ref_name }}.tgz"

      - name: Upload npm package artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-package
          path: ts-cli/jwcode-cli-${{ github.ref_name }}.tgz
          compression-level: 0

      - name: Upload backend JAR as separate artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: ts-cli/backend/jwcode-web.jar
          compression-level: 0

  # ============================================================================
  # Job 2: Create GitHub Release + publish to npm
  # ============================================================================
  release:
    name: Create Release & Publish
    needs: [build-package]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'

      - name: Download npm package
        uses: actions/download-artifact@v4
        with:
          name: npm-package
          path: npm-package

      - name: Download backend JAR
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: backend-jar

      - name: Copy JAR to ts-cli/backend for publish
        run: |
          mkdir -p ts-cli/backend
          cp backend-jar/jwcode-web.jar ts-cli/backend/jwcode-web.jar

      - name: Create GitHub Release & upload all assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          ASSETS=$(find npm-package backend-jar -type f | tr '\n' ' ')
          echo "Tag: $TAG"
          echo "Uploading assets: $ASSETS"
          # Delete existing release for this tag to start fresh (e.g. on workflow re-run)
          gh release delete "$TAG" --yes 2>/dev/null || true
          gh release create "$TAG" $ASSETS --generate-notes --title "$TAG"

      - name: Install dependencies for publish
        working-directory: ts-cli
        run: npm ci

      - name: Sync version from git tag
        working-directory: ts-cli
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Setting package.json version to $VERSION from tag $GITHUB_REF_NAME"
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('package.json','utf8'));
            p.version = '$VERSION';
            fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          "

      - name: Build CLI before publish
        working-directory: ts-cli
        run: node build.mjs

      - name: Publish to npm
        working-directory: ts-cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
