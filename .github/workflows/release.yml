name: Release

on:
  push:
    tags:
      - 'v*'

env:
  NODE_VERSION: '22'
  JAVA_VERSION: '17'

jobs:
  # ============================================================================
  # Single job: build → release → publish (no artifact upload between jobs)
  # ============================================================================
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write   # required for npm Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: ts-cli/package-lock.json

      - name: Install npm dependencies
        working-directory: ts-cli
        run: npm ci

      - name: Build Java backend (fat JAR)
        run: mvn package -pl jwcode-web -am -q -DskipTests

      - name: Build CLI
        working-directory: ts-cli
        run: node build.mjs

      - name: Verify build output
        working-directory: ts-cli
        run: |
          ls -la dist/cli.js
          ls -la backend/jwcode-web.jar

      - name: Create npm tarball
        working-directory: ts-cli
        run: npm pack

      - name: Rename npm tarball to stable name
        working-directory: ts-cli
        run: |
          mkdir -p assets
          mv jwcode-cli-*.tgz "assets/jwcode-cli-${{ github.ref_name }}.tgz"
          cp backend/jwcode-web.jar "assets/jwcode-web.jar"

      - name: Create GitHub Release & upload all assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          ASSETS=$(find assets -type f | tr '\n' ' ')
          echo "Tag: $TAG"
          echo "Uploading assets: $ASSETS"
          # Delete existing release for this tag to start fresh (e.g. on workflow re-run)
          gh release delete "$TAG" --yes 2>/dev/null || true
          if ! gh release create "$TAG" $ASSETS --generate-notes --title "$TAG"; then
            echo "ERROR: Failed to create GitHub release — aborting to avoid orphaned npm package"
            exit 1
          fi
          echo "RELEASE_CREATED=true" >> "$GITHUB_ENV"

      - name: Sync version from git tag
        working-directory: ts-cli
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Setting package.json version to $VERSION from tag $GITHUB_REF_NAME"
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('package.json','utf8'));
            p.version = '$VERSION';
            fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          "

      - name: Build CLI before publish
        working-directory: ts-cli
        run: node build.mjs

      - name: Publish to npm
        working-directory: ts-cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
      # TODO: enable --provenance once @jwcode npm scope is linked to jwcode-ai GitHub org
