# A2A Protocol Configuration
# ==========================

# Dispatch mode: LOCAL, REMOTE, AUTO
a2a.mode=LOCAL

# Registry endpoint for remote agent discovery
a2a.registry.endpoint=http://localhost:9100

# Base port for A2A servers
a2a.base.port=9100

# Connection timeout in seconds
a2a.connect.timeout=10

# Request timeout in seconds
a2a.request.timeout=30

# Auto-refresh agent cards from registry
a2a.auto.refresh=true

# Refresh interval in seconds
a2a.refresh.interval=60
